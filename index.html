<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#3498db">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Pot Designer">
    <meta name="description" content="Equation-driven 3D pot and vessel designer with multi-color patterns">
    <link rel="manifest" href="manifest.json">
    <title>Multi-Color Pot Designer</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --panel: #ffffff;
            --primary: #3498db;
            --secondary: #2c3e50;
            --success: #27ae60;
            --highlight: #9b59b6;
            --danger: #e74c3c;
            --export3mf: #8e44ad;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        #sidebar {
            width: 460px; background: var(--panel); padding: 25px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1); overflow-y: auto; z-index: 100; flex-shrink: 0;
        }
        #viewer-container { flex-grow: 1; background: #ffffff; position: relative; touch-action: none; }
        .section-title { font-size: 0.95rem; color: var(--secondary); border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 20px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group { margin-bottom: 10px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .color-row { grid-template-columns: 1fr 1fr; gap: 14px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        input[type="number"], select, textarea { width: 100%; padding: 7px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.85rem; }
        textarea { height: 72px; font-family: 'Courier New', monospace; background: #fafafa; line-height: 1.4; resize: vertical; }
        .tex-area { border-color: var(--highlight); background: #fdfafef0; }
        .desc-text { font-size: 0.75rem; color: #7f8c8d; font-style: italic; margin-top: -6px; margin-bottom: 10px; line-height: 1.25; }
        .pot-toggle { background: #e8f4f8; padding: 10px; border-radius: 6px; border: 1px solid #bce0ee; display: flex; align-items: center; margin-bottom: 15px; margin-top: 15px; }
        .pot-toggle input { width: auto; margin-right: 10px; transform: scale(1.2); cursor: pointer; }
        .pot-toggle label { margin-bottom: 0; font-size: 0.9rem; color: var(--primary); cursor: pointer; font-weight: bold; }
        .pot-settings { display: none; background: #fff8e1; padding: 12px; border-radius: 6px; border: 1px solid #ffe082; margin-bottom: 15px; }
        .pot-settings.active { display: block; }
        .color-chip { height: 46px; padding: 4px; width: 100%; }
        button { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: opacity 0.2s; font-size: 0.9rem; }
        button:active { opacity: 0.8; }
        .btn-preview { background: var(--secondary); }
        .btn-stl { background: var(--success); }
        .btn-3mf { background: var(--export3mf); }
        #status { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.74); color: white; padding: 8px 18px; border-radius: 20px; font-size: 12px; pointer-events: none; max-width: calc(100% - 40px); }

        .status-error { background: rgba(231, 76, 60, 0.92) !important; }
        .status-warn { background: rgba(230, 126, 34, 0.92) !important; }

        /* --- COMPACT MOBILE OVERRIDES --- */
        @media (max-width: 768px) {
            /* 1. Stack the layout vertically instead of side-by-side */
            body {
                flex-direction: column-reverse; 
            }
            
            /* 2. Put the 3D viewer on the top 50% of the screen */
            #viewer-container {
                width: 100%;
                height: 50vh; 
                flex-grow: 0;
            }
            
            /* 3. Put the controls on the bottom 50% of the screen */
            #sidebar {
                width: 100%;
                height: 50vh; 
                min-width: 100%;
                padding: 15px;
                box-sizing: border-box;
            }
            
            h2 {
                font-size: 0.9rem !important;
                margin: 0 0 5px 0 !important;
            }
            }
            .section-title {
                font-size: 0.68rem;
                margin-top: 8px;
                margin-bottom: 5px;
                padding-bottom: 3px;
                letter-spacing: 0.25px;
            }
            .input-group {
                margin-bottom: 4px !important;
            }
            .grid-inputs {
                gap: 4px;
                margin-bottom: 4px;
            }
            .grid-3 {
                gap: 3px;
                margin-bottom: 4px;
            }
            .color-row {
                gap: 4px;
            }
            label {
                font-size: 0.6rem;
                margin-bottom: 1px !important;
                line-height: 1;
            }
            input[type="number"], select, textarea {
                padding: 4px !important;
                font-size: 0.72rem !important;
                border-radius: 4px;
            }
            input[type="number"], select {
                height: 28px;
            }
            textarea {
                height: 50px !important;
                font-size: 0.62rem !important;
                margin-bottom: 4px;
                line-height: 1.15;
            }
            .desc-text {
                font-size: 0.52rem;
                margin-top: -2px;
                margin-bottom: 4px;
                line-height: 1.1;
            }
            .pot-toggle {
                padding: 6px;
                margin-bottom: 8px;
                margin-top: 8px;
            }
            .pot-toggle input {
                margin-right: 6px;
                transform: scale(1.0);
            }
            .pot-toggle label {
                font-size: 0.7rem;
            }
            .pot-settings {
                padding: 6px;
                margin-bottom: 8px;
            }
            .color-chip {
                height: 32px;
                padding: 2px;
            }
            button {
                padding: 10px 4px !important;
                font-size: 0.7rem !important;
                margin-top: 4px !important;
            }
            #status {
                font-size: 10px;
                padding: 5px 12px;
                bottom: 10px;
                left: 10px;
                max-width: calc(100% - 20px);
            }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="margin-top:0; color:var(--secondary)">Multi-Color Pot Designer</h2>

    <div class="section-title">1. Base Scaffold</div>
    <div class="input-group">
        <select id="coordSystem" onchange="switchSystem()">
            <option value="cylindrical">Cylindrical Extrusion (r, θ, z)</option>
            <option value="spherical">Spherical Wrap (r, θ, φ)</option>
        </select>
    </div>
    <div class="input-group">
        <select id="presetSelect" onchange="applyPreset()"></select>
    </div>
    <div id="baseDesc" class="desc-text"></div>
    <div class="input-group">
        <label>Form Equation: r(θ, <span class="varLabel">z</span>, v)</label>
        <textarea id="equation" oninput="updatePreview()"></textarea>
    </div>
    <div class="grid-inputs">
        <div class="input-group"><label>Base Radius (R)</label><input type="number" id="baseRadius" value="5" step="0.1" oninput="updatePreview()"></div>
        <div class="input-group" id="heightGroup"><label>Height (cm)</label><input type="number" id="height" value="10" step="0.5" oninput="updatePreview()"></div>
    </div>

    <div class="section-title" style="color: var(--highlight)">2. Surface Texture (External)</div>
    <div class="input-group">
        <select id="texPresetSelect" onchange="applyTexturePreset()"></select>
    </div>
    <div id="texDesc" class="desc-text"></div>
    <div class="input-group">
        <label style="color: var(--highlight)">Displacement: T(θ, <span class="varLabel">z</span>, v)</label>
        <textarea id="texEquation" class="tex-area" oninput="updatePreview()"></textarea>
    </div>
    <div class="input-group">
        <label>Texture Intensity (Multiplier)</label>
        <input type="number" id="texIntensity" value="0.15" step="0.05" oninput="updatePreview()">
    </div>

    <div class="section-title">3. Structural Geometry</div>
    <div class="input-group"><label>Wall Thick (cm) [Smooth Inside]</label><input type="number" id="wall" value="0.35" step="0.05" oninput="updatePreview()"></div>

    <div class="pot-toggle">
        <input type="checkbox" id="isPot" onchange="onPotToggle()">
        <label for="isPot">Enable Functional Pot Gen</label>
    </div>

    <div id="cylindricalPotSettings" class="pot-settings">
        <div class="grid-inputs">
            <div class="input-group"><label>Base Thick (cm)</label><input type="number" id="cylBase" value="0.5" step="0.1" oninput="updatePreview()"></div>
            <div class="input-group"><label>Drain Radius (cm)</label><input type="number" id="cylDrain" value="0.5" step="0.1" oninput="updatePreview()"></div>
        </div>
    </div>

    <div id="sphericalPotSettings" class="pot-settings">
        <div class="grid-3">
            <div class="input-group" title="Top Opening"><label>Top Cut (°)</label><input type="number" id="sphTopCut" value="25" step="1" min="0" max="89" oninput="updatePreview()"></div>
            <div class="input-group" title="Flat bed start"><label>Bot Flat (°)</label><input type="number" id="sphBotFlatten" value="150" step="1" min="90" max="179" oninput="updatePreview()"></div>
            <div class="input-group" title="Mesh hole end"><label>Bot Cut (°)</label><input type="number" id="sphBotCut" value="175" step="1" min="91" max="180" oninput="updatePreview()"></div>
        </div>
    </div>

    <div class="section-title" style="color: var(--highlight)">4. Color Pattern Overlay</div>
    <div class="input-group">
        <select id="patternPresetSelect" onchange="applyPatternPreset()"></select>
    </div>
    <div id="patternDesc" class="desc-text"></div>
    <div class="input-group">
        <label style="color: var(--highlight)">Pattern Mask: P(θ, <span class="varLabel">z</span>, v)</label>
        <textarea id="patternEquation" class="tex-area" oninput="updatePreview()"></textarea>
    </div>
    <div class="grid-inputs color-row">
        <div class="input-group"><label>Base Color</label><input type="color" id="baseColor" class="color-chip" value="#2980b9" oninput="updatePreview()"></div>
        <div class="input-group"><label>Pattern Color</label><input type="color" id="patternColor" class="color-chip" value="#f1c40f" oninput="updatePreview()"></div>
    </div>
    <div class="input-group">
        <label>Pattern Depth (mm)</label>
        <input type="number" id="patternDepthMm" value="1.2" step="0.1" min="0" oninput="updatePreview()">
    </div>

    <div class="section-title">Mesh Resolution</div>
    <div class="grid-inputs">
        <div class="input-group"><label>Vertical Nodes</label><input type="number" id="resV" value="120" step="10" min="20" oninput="updatePreview()"></div>
        <div class="input-group"><label>Radial Nodes (θ)</label><input type="number" id="resT" value="180" step="10" min="20" oninput="updatePreview()"></div>
    </div>
    <div class="grid-inputs">
        <div class="input-group"><label>Pattern Vertical Nodes</label><input type="number" id="patternResV" value="120" step="10" min="20" oninput="updatePreview()"></div>
        <div class="input-group"><label>Pattern Radial Nodes (θ)</label><input type="number" id="patternResT" value="180" step="10" min="20" oninput="updatePreview()"></div>
    </div>

    <button class="btn-preview" onclick="updatePreview()">RENDER PREVIEW</button>
    <button class="btn-3mf" onclick="exportMultiPart3MF()">DOWNLOAD MULTI-PART .3MF</button>
    <button class="btn-stl" onclick="exportSTL()">DOWNLOAD .STL</button>
    <div class="desc-text"></div>
</div>

<div id="viewer-container">
    <div id="status">Ready.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    let scene, camera, renderer, controls, currentObject = null;
    let renderTimeout = null;

const libraries = {
        cylindrical: {
            "Circle (Pure Base)": { eq: "R", desc: "Simple cylindrical scaffold." },
            "Rounded Square": { eq: "R * pow(pow(abs(cos(theta)), 8) + pow(abs(sin(theta)), 8), -0.125)", desc: "Rounded-square plan profile." },
            "Ellipse": { eq: "R / sqrt(pow(cos(theta), 2) + 2.5 * pow(sin(theta), 2))", desc: "Elliptical cross-section." },
            "Square Ripple": { eq: "R * pow(pow(abs(cos(theta)), 8) + pow(abs(sin(theta)), 8), -0.125) * (1 + 0.05 * sin(10 * z))", desc: "Rounded square with vertical ripple." },
            "Elliptical Twist": { eq: "R / sqrt(pow(cos(theta + z/3), 2) + 2.5 * pow(sin(theta + z/3), 2))", desc: "Ellipse twisting as it rises." },
            "5-Petal Flower": { eq: "R * (1 + 0.25 * cos(5 * theta))", desc: "Five-petal profile." },
            "Gear-like": { eq: "R * (1 + 0.08 * cos(12 * theta))", desc: "Fine radial teeth." },
            "Soft Gourd": { eq: "R * (1 + 0.10 * cos(4 * theta) + 0.05 * sin(2 * theta))", desc: "Organic gourd section." },
            "Wavy Ceramic": { eq: "R * (1 + 0.08 * cos(3 * theta) + 0.06 * sin(5 * theta))", desc: "Gentle ceramic waviness." },
            "Pumpkin Rib": { eq: "R * (1 + 0.14 * cos(8 * theta))", desc: "Classic pumpkin ribbing." },
            "Turbine Blade": { eq: "R * (1 + 0.18 * cos(5 * theta + 0.35 * sin(theta)))", desc: "Directional blade-like sweep." },
            "Column Fluting": { eq: "R * (1 + 0.10 * cos(12 * theta))", desc: "Architectural fluting scaffold." },
            "Islamic Rosette": { eq: "R * (1 + 0.14 * cos(8 * theta) + 0.06 * cos(4 * theta))", desc: "Rosette-like section." },
            "Opening Flower": { eq: "R * (1 + 0.25 * cos(5 * theta)) * (1 + 0.35 * sin(pi * z / 10))", desc: "Profile blossoms toward the middle." },
            "Sharpening Top": { eq: "R * (1 + (0.10 + 0.18 * z / 10) * cos(6 * theta))", desc: "Ridges intensify upward." },
            "Twisted Blossom": { eq: "R * (1 + 0.22 * cos(5 * theta + pi * z / 10))", desc: "Rotating floral ridges." },
            "3-to-6 Petal Morph (Bulged)": { eq: "R * (1 + 0.35 * sin(pi * z / 10)) * (1 + 0.25 * (((10 - z) / 10) * cos(3 * theta) + (z / 10) * cos(6 * theta)))", desc: "Cross-section morphs along height." },
            "3-to-6 Morph (Twisted)": { eq: "R * (1 + 0.35 * sin(pi * z / 10)) * (1 + 0.25 * (((10 - z) / 10) * cos(3 * (theta + (2*pi*z/30))) + (z / 10) * cos(6 * (theta + (2*pi*z/30)))))", desc: "Morph + twist." },
            "Accelerated Turbulence": { eq: "R * (1 + 0.25 * pow(z / 10.0, 1.1) * (cos(5 * theta + (pi * z / 4.0)) + 0.8 * sin(11 * theta - (pi * z / 8.0))))", desc: "High-energy profile growth." },
            "Fractal Growth": { eq: "R * (1 + (min(max((z-0.0)/2.5, 0), 1) * 0.18 * cos(3 * theta)) + (min(max((z-2.5)/2.5, 0), 1) * 0.15 * cos(6 * theta)) + (min(max((z-5.0)/2.5, 0), 1) * 0.10 * cos(12 * theta)) + (min(max((z-7.5)/2.5, 0), 1) * 0.08 * cos(24 * theta)))", desc: "Layered harmonic complexity." },
            "Antenna Migration": { eq: "R * (1 + 0.4 * pow(z / 10.0, 1.5) * abs(cos((2 + 6 * (z / 10.0)) * theta / 2.0)))", desc: "Frequency increases along height." },
            "Harmonic Oscillator": { eq: "R * (1 + 0.25 * abs(cos(pi * 1.0 * z / 10.0)) * cos(7 * theta))", desc: "AM-like modulation." },
            "Harmonic Beats (AM)": { eq: "R * (1 + 0.3 * abs(cos(pi * 1.5 * z / 10.0)) * cos(8 * (theta + (pi * z / 20.0))))", desc: "Beating pattern." },
            "Harmonic Beats (Inv)": { eq: "R * (1 + 0.3 * abs(cos(pi * 1.5 * (10-z) / 10.0)) * cos(8 * (theta + (pi * (10-z)/ 20.0))))", desc: "Inverted beating pattern." },
            "DNA Helix (S-Curve)": { eq: "R * (1 + 0.4 * cos(2 * (theta + (1.2 * sin(2 * pi * z / 10.0)))))", desc: "Helix-like lateral flow." },
            "Harmonic Strata Modeling": { eq: "R + 1 * (min(max(1-abs(z-1),0),1)*cos(3*theta) + min(max(1-abs(z-3),0),1)*cos(5*theta) + min(max(1-abs(z-5),0),1)*cos(7*theta) + min(max(1-abs(z-7),0),1)*cos(9*theta) + min(max(1-abs(z-9),0),1)*cos(11*theta))", desc: "Stratified harmonic bands." },
            "Spiral Triple-Helix": { eq: "(R + 2.0 * sin(pi * z / 10.0)) * (1 + 0.20 * cos(3 * theta + pi * z / 10.0))", desc: "Bulged helical scaffold." },
            "Bloomfold Vase": { eq: "(R-1.0)+1.2*sin(pi*z/10.0)+(0.34+0.42*sin(pi*z/10.0))*(pow(cos(0.5*pi*z/10.0),2)*cos(3*theta)+1.55*pow(sin(pi*z/10.0),2)*cos(6*theta))", desc: "High-quality vase scaffold." },
            "Trifold Bloom Vase": { eq: "(R-1.0)+1.2*sin(pi*z/10.0)+(0.34+0.42*sin(pi*z/10.0))*(pow(cos(pi*z/10.0),2)*cos(3*theta)+1.55*pow(sin(pi*z/10.0),2)*cos(6*theta))", desc: "Threefold bloom with higher-frequency crown." },
            "Twisted Trifold Bloom": { eq: "(R-1.0)+1.2*sin(pi*z/10.0)+(0.34+0.42*sin(pi*z/10.0))*(pow(cos(pi*z/10.0),2)*cos(3*(theta-pi*z/15.0))+1.55*pow(sin(pi*z/10.0),2)*cos(6*(theta-pi*z/15.0)))", desc: "Twisted bloom form." },
            "DNA Double Helix": { eq: "R + 0.5 * sin(4 * theta + z) + 0.5 * cos(4 * theta - z)", desc: "Double-helix profile." }
        },
        spherical: {
            "Dragon Egg": { eq: "R * (1 + 0.08 * cos(10*theta + 8*phi) + 0.08 * cos(10*theta - 8*phi))", desc: "Diamond-scale scaffold." },
            "Perfect Sphere": { eq: "R", desc: "Simple spherical scaffold." },
            "Aerospace Isogrid": { eq: "R * (1 + 0.08 * max(cos(12*theta + 10*phi), cos(12*theta - 10*phi)))", desc: "Structural diagrid." },
            "Crown Splash": { eq: "R * (1 + 0.35 * exp(-pow(phi - 0.4, 2) * 20) * max(0, cos(14 * theta)) + 0.05 * sin(phi * 8))", desc: "Splash-like crown near top." },
            "Phased Array Lobe": { eq: "R * (1 + 0.25 * pow(sin(phi), 4) * pow(cos(4*theta), 6) + 0.03 * sin(16*theta)*sin(phi))", desc: "Antenna-lobe inspired." },
            "Wind Shear Ripples": { eq: "R * (1 + 0.08 * sin(12*theta) * pow(sin(phi), 2) + 0.04 * sin(24*theta - 12*phi) * sin(phi))", desc: "Sheared wave pattern." },
            "Electron Cloud": { eq: "R * (1 + 0.3 * abs(pow(sin(phi), 3) * cos(phi) * sin(3*theta)))", desc: "Orbital-inspired bulges." },
            "Fibonacci Spirals": { eq: "R * (1 + 0.08 * pow(max(0, sin(13*theta - 8*phi)), 2) + 0.08 * pow(max(0, sin(8*theta + 13*phi)), 2))", desc: "Phyllotaxis-style spirals." },
            "Crystalline Geode": { eq: "R * (1 + 0.08 * (abs(sin(5*theta)) + abs(cos(5*theta))) * (abs(sin(4*phi)) + abs(cos(4*phi))))", desc: "Faceted crystalline surface." },
            "Gravity Drip": { eq: "R * (1 + 0.2 * exp(phi - 2.5) * cos(12 * theta) * sin(phi))", desc: "Dripping lower region." },
            "Liquid Audio Interference": { eq: "R * (1 + 0.04 * sin(18*theta) * cos(22*phi) + 0.03 * sin(28*theta - 12*phi))", desc: "Interference micro-topography." },
            "Overlapping Armor Scales": { eq: "R * (1 + 0.12 * pow(max(0, sin(10*theta - 6*phi)), 2) * sin(phi))", desc: "Scale-like outer pattern." },
            "Twisted Hex Vortex": { eq: "R * (1 + 0.15 * cos(6 * (theta + phi*2)))", desc: "Hex form with rotational drift." },
            "Ribbed Art Deco": { eq: "R * (1 + 0.15 * pow(cos(8*theta), 4) * sin(phi))", desc: "Art Deco finning." },
            "Equatorial Flare": { eq: "R * (1 + 0.4 * exp(-pow(phi-1.57, 2)*10))", desc: "Bulges near equator." },
            "Cellular Organic": { eq: "R * (1 + 0.06 * (sin(8*theta)*cos(10*phi) + sin(11*theta)*cos(5*phi)))", desc: "Organic, cellular modulation." },
            "Pumpkin Lobes": { eq: "R * (1 + 0.15 * cos(8 * theta))", desc: "Rounded lobes." },
            "Woven Basket": { eq: "R * (1 + 0.05 * sin(12 * theta) * cos(8 * phi))", desc: "Woven cross-pattern." },
            "Starfruit": { eq: "R * (1 + 0.25 * cos(5 * theta) * sin(phi))", desc: "Five-point spherical ridges." },
            "Hourglass / Peanut": { eq: "R * (1 - 0.25 * sin(2 * phi))", desc: "Pinched midsection." },
            "Coral Brain": { eq: "R * (1 + 0.08 * sin(10 * theta + 5*phi) * sin(8 * phi))", desc: "Dense brain-coral pattern." }
        }
    };

const patternPresets = {
        "Surface Texture Top %": { eq: "textureFill(texPosNorm, 65)", desc: "Selects the top raised share of the external texture. 0 selects none of the raised texture; 100 selects all of it." },
        "Outer Radius Deviation": { eq: "outerDeviation(0.25)", desc: "Colors regions where the live outer surface extends beyond a simple reference envelope built at R plus the requested deviation in centimeters. In cylindrical mode this behaves like a reference cylinder, and in spherical mode like a reference sphere." },
        "None (Solid Base Color)": { eq: "-1", desc: "No colored overlay; the whole pot uses the base color." },
        "Vertical Stripes": { eq: "cos(10*theta)", desc: "Alternating vertical color bands." },
        "Checkerboard": { eq: "sin(10*theta) * sin(10*pi*v)", desc: "Checker-style color blocking over height." },
        "Diamond Lattice": { eq: "cos(10*theta + 8*pi*v) * cos(10*theta - 8*pi*v)", desc: "Diamond color lattice." },
        "Helical Wrap": { eq: "sin(6*theta + 10*pi*v)", desc: "Single helical color ribbon." },
        "Dragon Scale Color": { eq: "max(cos(10*theta + 8*pi*v), cos(10*theta - 8*pi*v)) - 0.2", desc: "Scale-like color zoning for egg or sphere forms." },
        "Top Bands": { eq: "sin(16*pi*v) - 0.2", desc: "Horizontal color bands that stack upward." },
        "Petal Highlights": { eq: "cos(5*theta) * sin(pi*v)", desc: "Petal-based highlight pattern." }
    };

const texturePresets = {
        "None (Flat Surface)": { eq: "0", desc: "No additional texture displacement." },
        "Fine Vertical Ribs": { eq: "cos(16*theta)", desc: "Classic vertical ribbing that works well on most forms." },

    function secureEval(eq, theta, z, phi, v, R, isTexture = false) {
        try {
            const pi = Math.PI, sin = Math.sin, cos = Math.cos, pow = Math.pow,
                  min = Math.min, max = Math.max, abs = Math.abs, exp = Math.exp, sqrt = Math.sqrt;
            let result = eval(eq);
            let fallback = isTexture ? 0 : R;
            return (typeof result !== 'number' || isNaN(result) || !isFinite(result)) ? fallback : result;
        } catch (e) {
            return isTexture ? 0 : R;
        }
    }

    function hexToRgb01(hex) {
        const n = parseInt((hex || "#000000").replace('#', ''), 16);
        return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255];
    }

    function mod(n, m) {
        return ((n % m) + m) % m;
    }

    function clonePt(p) { return { x: p.x, y: p.y, z: p.z }; }

    function lerpPt(a, b, t) {
        return {
            x: a.x + (b.x - a.x) * t,
            y: a.y + (b.y - a.y) * t,
            z: a.z + (b.z - a.z) * t
        };
    }

    function distPt(a, b) {
        const dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
        return Math.sqrt(dx * dx + dy * dy + dz * dz);
    }

    function averagePoints(points) {
        let x = 0, y = 0, z = 0;
        for (const p of points) { x += p.x; y += p.y; z += p.z; }
        const inv = 1 / points.length;
        return { x: x * inv, y: y * inv, z: z * inv };
    }

    function subPt(a, b) { return { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z }; }

    function cross(a, b) {
        return {
            x: a.y * b.z - a.z * b.y,
            y: a.z * b.x - a.x * b.z,
            z: a.x * b.y - a.y * b.x
        };
    }

    function dot(a, b) { return a.x * b.x + a.y * b.y + a.z * b.z; }

    function triArea2(a, b, c) {
        const ab = subPt(b, a);
        const ac = subPt(c, a);
        const cr = cross(ab, ac);
        return Math.sqrt(dot(cr, cr));
    }

    function supportsMultipart(cfg) {
        return true;
    }

    function evaluatePatternValue(cfg, theta, z, phi, v, outerRadius, baseFormRadius, texRaw, stats) {
        try {
            const pi = Math.PI, sin = Math.sin, cos = Math.cos, pow = Math.pow,
                  min = Math.min, max = Math.max, abs = Math.abs, exp = Math.exp, sqrt = Math.sqrt;
            const R = cfg.R || 0;
            const texMin = stats ? stats.texMin : 0;
            const texMax = stats ? stats.texMax : 0;
            const texRange = Math.max(1e-9, texMax - texMin);
            const texNorm = (texRaw - texMin) / texRange;
            const texPosMax = stats ? stats.texPosMax : 0;
            const texPosNorm = texPosMax > 1e-9 ? Math.max(0, texRaw) / texPosMax : 0;
            const radiusMin = stats ? stats.radiusMin : 0;
            const radiusMax = stats ? stats.radiusMax : 0;
            const radiusRange = Math.max(1e-9, radiusMax - radiusMin);
            const radiusNorm = (outerRadius - radiusMin) / radiusRange;
            const localBaseRadius = Math.max(0, baseFormRadius || 0);
            const localRadiusDev = Math.max(0, outerRadius - localBaseRadius);
            const radiusDev = Math.max(0, outerRadius - R);
            const absRadiusDev = radiusDev;
            function outerDeviation(dev) { return outerRadius - (R + dev); }
            function textureFill(value, pct) {
                const p = Math.max(0, Math.min(100, pct));
                if (p <= 0) return -1;
                if (p >= 100) return value > 0 ? 1 : -1;
                const threshold = 1 - (p / 100);
                return value - threshold;
            }
            const result = eval(cfg.patternEq);
            return (typeof result === 'number' && isFinite(result)) ? result : -1;
        } catch (e) {
            return -1;
        }
    }

    function buildParametricShell(cfg) {
        const shellCfg = Object.assign({}, cfg, {
            resV: Math.max(cfg.resV || 0, cfg.patternResV || 0, 20),
            resT: Math.max(cfg.resT || 0, cfg.patternResT || 0, 20)
        });
        return shellCfg.sys === 'cylindrical' ? buildCylindricalShell(shellCfg) : buildSphericalShell(shellCfg);
    }

    function buildCylindricalShell(cfg) {
        const outer = [], inner = [], cellMask = [];
        const actualBase = cfg.isPot ? Math.max(0, Math.min(cfg.h, cfg.cylBase)) : 0;

        const rawZNodes = [];
        for (let iv = 0; iv <= cfg.resV; iv++) rawZNodes.push(cfg.h * (iv / cfg.resV));
        if (cfg.isPot && actualBase > 1e-8 && actualBase < cfg.h - 1e-8) rawZNodes.push(actualBase);
        rawZNodes.sort((a, b) => a - b);

        const zNodes = [];
        for (const z of rawZNodes) {
            if (!zNodes.length || Math.abs(z - zNodes[zNodes.length - 1]) > 1e-8) zNodes.push(z);
        }

        const shellResV = Math.max(1, zNodes.length - 1);

        for (let iv = 0; iv <= shellResV; iv++) {
            const zO = zNodes[iv];
            const v = cfg.h > 1e-8 ? zO / cfg.h : 0;
            const zI = actualBase + (cfg.h - actualBase) * v;
            const oRow = [], iRow = [];

            for (let it = 0; it < cfg.resT; it++) {
                const theta = (2 * Math.PI * it) / cfg.resT;
                const rBaseOuter = secureEval(cfg.eq, theta, zO, 0, v, cfg.R, false);
                const rBaseInner = secureEval(cfg.eq, theta, zI, 0, v, cfg.R, false);
                const texDisp = secureEval(cfg.texEq, theta, zO, 0, v, 0, true);

                const rOut = Math.max(0.1, rBaseOuter + (texDisp * cfg.texInt));
                const rIn = Math.max(0.08, rBaseInner - cfg.w);

                oRow.push({ x: rOut * Math.cos(theta), y: zO, z: -rOut * Math.sin(theta) });
                iRow.push({ x: rIn * Math.cos(theta), y: zI, z: -rIn * Math.sin(theta) });
            }
            outer.push(oRow);
            inner.push(iRow);
        }

        const cellFields = [];
        const stats = { texMin: Infinity, texMax: -Infinity, texPosMax: 0, radiusMin: Infinity, radiusMax: -Infinity };
        for (let iv = 0; iv < shellResV; iv++) {
            const row = [];
            const z0 = zNodes[iv];
            const z1 = zNodes[iv + 1];
            const zMid = 0.5 * (z0 + z1);
            const vMid = cfg.h > 1e-8 ? zMid / cfg.h : 0;
            for (let it = 0; it < cfg.resT; it++) {
                const thetaMid = (2 * Math.PI * (it + 0.5)) / cfg.resT;
                const texRaw = secureEval(cfg.texEq, thetaMid, zMid, 0, vMid, 0, true);
                const rBaseOuter = secureEval(cfg.eq, thetaMid, zMid, 0, vMid, cfg.R, false);
                const outerRadius = Math.max(0.1, rBaseOuter + (texRaw * cfg.texInt));
                stats.texMin = Math.min(stats.texMin, texRaw);
                stats.texMax = Math.max(stats.texMax, texRaw);
                stats.texPosMax = Math.max(stats.texPosMax, Math.max(0, texRaw));
                stats.radiusMin = Math.min(stats.radiusMin, outerRadius);
                stats.radiusMax = Math.max(stats.radiusMax, outerRadius);
                row.push({ thetaMid, zMid, phiMid: 0, vMid, texRaw, outerRadius, baseFormRadius: rBaseOuter });
            }
            cellFields.push(row);
        }
        if (!isFinite(stats.texMin)) { stats.texMin = 0; stats.texMax = 0; stats.radiusMin = 0; stats.radiusMax = 0; }
        for (let iv = 0; iv < shellResV; iv++) {
            const row = [];
            for (let it = 0; it < cfg.resT; it++) {
                const f = cellFields[iv][it];
                const allowPattern = !(cfg.isPot && f.zMid <= actualBase + 1e-6);
                row.push(allowPattern && evaluatePatternValue(cfg, f.thetaMid, f.zMid, 0, f.vMid, f.outerRadius, f.baseFormRadius, f.texRaw, stats) > 0);
            }
            cellMask.push(row);
        }

        return { outer, inner, cellMask, resV: shellResV, resT: cfg.resT, yShift: 0 };
    }

    function buildSphericalShell(cfg) {
        const outer = [], inner = [], cellMask = [];
        let minY = Infinity;

        const phiStart = cfg.isPot ? cfg.sphTopCut : 0.001;
        const phiEnd = cfg.isPot ? cfg.sphBotCut : Math.PI - 0.001;
        const flatBottomY = cfg.R * Math.cos(cfg.sphBotFlatten);

        for (let iv = 0; iv <= cfg.resV; iv++) {
            const phi = phiStart + (phiEnd - phiStart) * (iv / cfg.resV);
            const v = (phi - phiEnd) / (phiStart - phiEnd);
            const oRow = [], iRow = [];

            for (let it = 0; it < cfg.resT; it++) {
                const theta = (2 * Math.PI * it) / cfg.resT;
                const rBaseOuter = secureEval(cfg.eq, theta, 0, phi, v, cfg.R, false);
                const texDisp = secureEval(cfg.texEq, theta, 0, phi, v, 0, true);

                const rOut = Math.max(0.1, rBaseOuter + (texDisp * cfg.texInt));
                const rIn = Math.max(0.08, rBaseOuter - cfg.w);

                let oX = rOut * Math.sin(phi) * Math.cos(theta);
                let oZ = rOut * Math.sin(phi) * Math.sin(theta);
                let oY = rOut * Math.cos(phi);

                let iX = rIn * Math.sin(phi) * Math.cos(theta);
                let iZ = rIn * Math.sin(phi) * Math.sin(theta);
                let iY = rIn * Math.cos(phi);

                if (cfg.isPot && (phi >= cfg.sphBotFlatten || oY < flatBottomY)) {
                    oY = flatBottomY;
                    iY = flatBottomY + cfg.w;
                }

                if (oY < minY) minY = oY;
                oRow.push({ x: oX, y: oY, z: -oZ });
                iRow.push({ x: iX, y: iY, z: -iZ });
            }
            outer.push(oRow);
            inner.push(iRow);
        }

        if (!isFinite(minY)) minY = -cfg.R;

        for (let iv = 0; iv <= cfg.resV; iv++) {
            for (let it = 0; it < cfg.resT; it++) {
                outer[iv][it].y -= minY;
                inner[iv][it].y -= minY;
            }
        }

        const cellFields = [];
        const stats = { texMin: Infinity, texMax: -Infinity, texPosMax: 0, radiusMin: Infinity, radiusMax: -Infinity };
        for (let iv = 0; iv < cfg.resV; iv++) {
            const row = [];
            const phiMid = phiStart + (phiEnd - phiStart) * ((iv + 0.5) / cfg.resV);
            const vMid = (phiMid - phiEnd) / (phiStart - phiEnd);
            for (let it = 0; it < cfg.resT; it++) {
                const thetaMid = (2 * Math.PI * (it + 0.5)) / cfg.resT;
                const texRaw = secureEval(cfg.texEq, thetaMid, 0, phiMid, vMid, 0, true);
                const rBaseOuter = secureEval(cfg.eq, thetaMid, 0, phiMid, vMid, cfg.R, false);
                const outerRadius = Math.max(0.1, rBaseOuter + (texRaw * cfg.texInt));
                stats.texMin = Math.min(stats.texMin, texRaw);
                stats.texMax = Math.max(stats.texMax, texRaw);
                stats.texPosMax = Math.max(stats.texPosMax, Math.max(0, texRaw));
                stats.radiusMin = Math.min(stats.radiusMin, outerRadius);
                stats.radiusMax = Math.max(stats.radiusMax, outerRadius);
                row.push({ thetaMid, zMid: 0, phiMid, vMid, texRaw, outerRadius, baseFormRadius: rBaseOuter });
            }
            cellFields.push(row);
        }
        if (!isFinite(stats.texMin)) { stats.texMin = 0; stats.texMax = 0; stats.radiusMin = 0; stats.radiusMax = 0; }
        for (let iv = 0; iv < cfg.resV; iv++) {
            const row = [];
            for (let it = 0; it < cfg.resT; it++) {
                const f = cellFields[iv][it];
                row.push(evaluatePatternValue(cfg, f.thetaMid, 0, f.phiMid, f.vMid, f.outerRadius, f.baseFormRadius, f.texRaw, stats) > 0);
            }
            cellMask.push(row);
        }

        return { outer, inner, cellMask, resV: cfg.resV, resT: cfg.resT, yShift: minY };
    }

    function buildLayeredSample(cfg) {
        const shell = buildParametricShell(cfg);
        const layers = [
            Array.from({ length: shell.resV + 1 }, () => Array(shell.resT)),
            Array.from({ length: shell.resV + 1 }, () => Array(shell.resT)),
            Array.from({ length: shell.resV + 1 }, () => Array(shell.resT))
        ];

        for (let iv = 0; iv <= shell.resV; iv++) {
            for (let it = 0; it < shell.resT; it++) {
                const pOut = shell.outer[iv][it];
                const pIn = shell.inner[iv][it];
                const thickness = distPt(pOut, pIn);
                let requestedDepth = cfg.patternDepthCm;
                if (cfg.sys === 'cylindrical' && cfg.isPot && pOut.y <= cfg.cylBase + 1e-6) requestedDepth = 0;
                const safeDepth = Math.min(requestedDepth, Math.max(0, thickness - 0.001));
                const t = thickness > 1e-8 ? safeDepth / thickness : 0;
                layers[0][iv][it] = clonePt(pOut);
                layers[1][iv][it] = lerpPt(pOut, pIn, t);
                layers[2][iv][it] = clonePt(pIn);
            }
        }

        return { layers, cellMask: shell.cellMask, resV: shell.resV, resT: shell.resT, yShift: shell.yShift };
    }

    function buildOccupancies(sample, cfg) {
        const baseOcc = Array.from({ length: 2 }, () => Array.from({ length: sample.resV }, () => Array(sample.resT).fill(false)));
        const patternOcc = Array.from({ length: 2 }, () => Array.from({ length: sample.resV }, () => Array(sample.resT).fill(false)));
        let hasPattern = false;

        const depthActive = cfg.patternDepthCm > 0.0001;
        for (let iv = 0; iv < sample.resV; iv++) {
            for (let it = 0; it < sample.resT; it++) {
                const mask = depthActive && sample.cellMask[iv][it];
                baseOcc[1][iv][it] = true;
                if (mask) {
                    patternOcc[0][iv][it] = true;
                    hasPattern = true;
                } else {
                    baseOcc[0][iv][it] = true;
                }
            }
        }

        return { baseOcc, patternOcc, hasPattern };
    }

    function buildOccupancyMesh(sample, occ, options = {}) {
        const positions = [];
        const indices = [];
        const vertexMap = new Map();
        const resV = sample.resV;
        const resT = sample.resT;
        const layers = sample.layers;
        const skipMinusIVFace = options.skipMinusIVFace || (() => false);

        function getNode(layer, iv, it) {
            return layers[layer][iv][mod(it, resT)];
        }

        function getIndex(layer, iv, it) {
            const key = `${layer}_${iv}_${mod(it, resT)}`;
            if (vertexMap.has(key)) return vertexMap.get(key);
            const p = getNode(layer, iv, it);
            const idx = positions.length / 3;
            positions.push(p.x, p.y, p.z);
            vertexMap.set(key, idx);
            return idx;
        }

        function addTriangle(ai, bi, ci, pa, pb, pc) {
            if (ai === bi || bi === ci || ai === ci) return;
            if (triArea2(pa, pb, pc) < 1e-7) return;
            indices.push(ai, bi, ci);
        }

        function addQuad(corners, cellCenter) {
            const pts = corners.map(c => getNode(c.layer, c.iv, c.it));
            const faceCenter = averagePoints(pts);
            const e1 = subPt(pts[1], pts[0]);
            const e2 = subPt(pts[2], pts[0]);
            const n = cross(e1, e2);
            const outward = subPt(faceCenter, cellCenter);
            let ordered = corners.slice();

            if (dot(n, outward) < 0) {
                ordered = [corners[0], corners[3], corners[2], corners[1]];
            }

            const orderedPts = ordered.map(c => getNode(c.layer, c.iv, c.it));
            const compact = [];
            const compactPts = [];

            for (let i = 0; i < ordered.length; i++) {
                const p = orderedPts[i];
                const prev = compactPts.length ? compactPts[compactPts.length - 1] : null;
                if (prev && distPt(prev, p) < 1e-7) continue;
                compact.push(ordered[i]);
                compactPts.push(p);
            }

            if (compactPts.length > 2 && distPt(compactPts[0], compactPts[compactPts.length - 1]) < 1e-7) {
                compact.pop();
                compactPts.pop();
            }

            if (compact.length < 3) return;

            const ids = compact.map(c => getIndex(c.layer, c.iv, c.it));

            if (compact.length === 3) {
                addTriangle(ids[0], ids[1], ids[2], compactPts[0], compactPts[1], compactPts[2]);
                return;
            }

            if (compact.length === 4) {
                const areaA = triArea2(compactPts[0], compactPts[1], compactPts[2]) + triArea2(compactPts[0], compactPts[2], compactPts[3]);
                const areaB = triArea2(compactPts[0], compactPts[1], compactPts[3]) + triArea2(compactPts[1], compactPts[2], compactPts[3]);

                if (areaA >= areaB) {
                    addTriangle(ids[0], ids[1], ids[2], compactPts[0], compactPts[1], compactPts[2]);
                    addTriangle(ids[0], ids[2], ids[3], compactPts[0], compactPts[2], compactPts[3]);
                } else {
                    addTriangle(ids[0], ids[1], ids[3], compactPts[0], compactPts[1], compactPts[3]);
                    addTriangle(ids[1], ids[2], ids[3], compactPts[1], compactPts[2], compactPts[3]);
                }
                return;
            }

            for (let i = 1; i < compact.length - 1; i++) {
                addTriangle(ids[0], ids[i], ids[i + 1], compactPts[0], compactPts[i], compactPts[i + 1]);
            }
        }

        function isOcc(k, iv, it) {
            if (k < 0 || k > 1) return false;
            if (iv < 0 || iv >= resV) return false;
            return occ[k][iv][mod(it, resT)];
        }

        for (let k = 0; k < 2; k++) {
            for (let iv = 0; iv < resV; iv++) {
                for (let it = 0; it < resT; it++) {
                    if (!occ[k][iv][it]) continue;

                    const it1 = mod(it + 1, resT);
                    const corners = {
                        A: { layer: k, iv: iv, it: it },
                        B: { layer: k, iv: iv, it: it1 },
                        C: { layer: k, iv: iv + 1, it: it1 },
                        D: { layer: k, iv: iv + 1, it: it },
                        E: { layer: k + 1, iv: iv, it: it },
                        F: { layer: k + 1, iv: iv, it: it1 },
                        G: { layer: k + 1, iv: iv + 1, it: it1 },
                        H: { layer: k + 1, iv: iv + 1, it: it }
                    };

                    const cellCenter = averagePoints([
                        getNode(k, iv, it), getNode(k, iv, it1), getNode(k, iv + 1, it1), getNode(k, iv + 1, it),
                        getNode(k + 1, iv, it), getNode(k + 1, iv, it1), getNode(k + 1, iv + 1, it1), getNode(k + 1, iv + 1, it)
                    ]);

                    if (!isOcc(k - 1, iv, it)) addQuad([corners.A, corners.B, corners.C, corners.D], cellCenter);
                    if (!isOcc(k + 1, iv, it)) addQuad([corners.E, corners.H, corners.G, corners.F], cellCenter);

                    if (!isOcc(k, iv - 1, it) && !skipMinusIVFace(k, iv, it)) addQuad([corners.A, corners.E, corners.F, corners.B], cellCenter);
                    if (!isOcc(k, iv + 1, it)) addQuad([corners.D, corners.C, corners.G, corners.H], cellCenter);

                    if (!isOcc(k, iv, it - 1)) addQuad([corners.A, corners.D, corners.H, corners.E], cellCenter);
                    if (!isOcc(k, iv, it + 1)) addQuad([corners.B, corners.F, corners.G, corners.C], cellCenter);
                }
            }
        }

        return cleanupMesh({ positions, indices });
    }

    function cleanupMesh(mesh) {
        const inPos = mesh.positions;
        const inIdx = mesh.indices;
        const weldedPositions = [];
        const remap = new Map();
        const vertMap = new Map();
        const eps = 1e-6;

        function keyFor(x, y, z) {
            return `${Math.round(x / eps)}_${Math.round(y / eps)}_${Math.round(z / eps)}`;
        }

        for (let i = 0; i < inPos.length; i += 3) {
            const x = inPos[i], y = inPos[i + 1], z = inPos[i + 2];
            const key = keyFor(x, y, z);
            let idx = vertMap.get(key);
            if (idx === undefined) {
                idx = weldedPositions.length / 3;
                weldedPositions.push(x, y, z);
                vertMap.set(key, idx);
            }
            remap.set(i / 3, idx);
        }

        const cleaned = [];
        const triSeen = new Set();

        for (let i = 0; i < inIdx.length; i += 3) {
            const a = remap.get(inIdx[i]);
            const b = remap.get(inIdx[i + 1]);
            const c = remap.get(inIdx[i + 2]);
            if (a === b || b === c || a === c) continue;

            const ax = weldedPositions[a * 3], ay = weldedPositions[a * 3 + 1], az = weldedPositions[a * 3 + 2];
            const bx = weldedPositions[b * 3], by = weldedPositions[b * 3 + 1], bz = weldedPositions[b * 3 + 2];
            const cx = weldedPositions[c * 3], cy = weldedPositions[c * 3 + 1], cz = weldedPositions[c * 3 + 2];

            const abx = bx - ax, aby = by - ay, abz = bz - az;
            const acx = cx - ax, acy = cy - ay, acz = cz - az;
            const nx = aby * acz - abz * acy;
            const ny = abz * acx - abx * acz;
            const nz = abx * acy - aby * acx;
            const area2 = Math.sqrt(nx * nx + ny * ny + nz * nz);
            if (area2 < 1e-8) continue;

            const key = [a, b, c].slice().sort((m, n) => m - n).join('_');
            if (triSeen.has(key)) continue;
            triSeen.add(key);
            cleaned.push(a, b, c);
        }

        return orientMeshConsistently({ positions: weldedPositions, indices: cleaned });
    }


    function orientMeshConsistently(mesh) {
        const faces = [];
        for (let i = 0; i < mesh.indices.length; i += 3) {
            faces.push([mesh.indices[i], mesh.indices[i + 1], mesh.indices[i + 2]]);
        }
        if (!faces.length) return mesh;

        const edgeMap = new Map();
        function addFaceEdge(faceIndex, a, b) {
            const key = a < b ? `${a}_${b}` : `${b}_${a}`;
            let list = edgeMap.get(key);
            if (!list) {
                list = [];
                edgeMap.set(key, list);
            }
            list.push({ faceIndex, a, b });
        }

        for (let fi = 0; fi < faces.length; fi++) {
            const tri = faces[fi];
            addFaceEdge(fi, tri[0], tri[1]);
            addFaceEdge(fi, tri[1], tri[2]);
            addFaceEdge(fi, tri[2], tri[0]);
        }

        const visited = new Array(faces.length).fill(false);
        const flipped = new Array(faces.length).fill(false);

        function faceVolume(face) {
            const a = face[0] * 3, b = face[1] * 3, c = face[2] * 3;
            const ax = mesh.positions[a], ay = mesh.positions[a + 1], az = mesh.positions[a + 2];
            const bx = mesh.positions[b], by = mesh.positions[b + 1], bz = mesh.positions[b + 2];
            const cx = mesh.positions[c], cy = mesh.positions[c + 1], cz = mesh.positions[c + 2];
            return (ax * (by * cz - bz * cy) + ay * (bz * cx - bx * cz) + az * (bx * cy - by * cx)) / 6.0;
        }

        for (let seed = 0; seed < faces.length; seed++) {
            if (visited[seed]) continue;

            const stack = [seed];
            const component = [];
            visited[seed] = true;
            flipped[seed] = false;

            while (stack.length) {
                const fi = stack.pop();
                component.push(fi);
                const tri = faces[fi];

                const triEdges = [
                    [tri[0], tri[1]],
                    [tri[1], tri[2]],
                    [tri[2], tri[0]]
                ];

                for (const [a, b] of triEdges) {
                    const key = a < b ? `${a}_${b}` : `${b}_${a}`;
                    const shared = edgeMap.get(key) || [];
                    for (const entry of shared) {
                        const fj = entry.faceIndex;
                        if (fj === fi) continue;

                        const sameDirection = entry.a === a && entry.b === b;
                        const requiredFlip = flipped[fi] ^ sameDirection;

                        if (!visited[fj]) {
                            visited[fj] = true;
                            flipped[fj] = requiredFlip;
                            stack.push(fj);
                        }
                    }
                }
            }

            let signedVolume = 0;
            for (const fi of component) {
                const face = flipped[fi] ? [faces[fi][0], faces[fi][2], faces[fi][1]] : faces[fi];
                signedVolume += faceVolume(face);
            }

            if (signedVolume < 0) {
                for (const fi of component) flipped[fi] = !flipped[fi];
            }
        }

        const outIndices = [];
        for (let fi = 0; fi < faces.length; fi++) {
            const face = flipped[fi] ? [faces[fi][0], faces[fi][2], faces[fi][1]] : faces[fi];
            outIndices.push(face[0], face[1], face[2]);
        }

        return { positions: mesh.positions.slice(), indices: outIndices };
    }

    function validateMesh(mesh) {
        const edges = new Map();
        let signedVolume = 0;
        for (let i = 0; i < mesh.indices.length; i += 3) {
            const a = mesh.indices[i];
            const b = mesh.indices[i + 1];
            const c = mesh.indices[i + 2];
            const tri = [a, b, c];
            for (let e = 0; e < 3; e++) {
                const u = tri[e];
                const v = tri[(e + 1) % 3];
                const key = u < v ? `${u}_${v}` : `${v}_${u}`;
                edges.set(key, (edges.get(key) || 0) + 1);
            }

            const ax = mesh.positions[a * 3], ay = mesh.positions[a * 3 + 1], az = mesh.positions[a * 3 + 2];
            const bx = mesh.positions[b * 3], by = mesh.positions[b * 3 + 1], bz = mesh.positions[b * 3 + 2];
            const cx = mesh.positions[c * 3], cy = mesh.positions[c * 3 + 1], cz = mesh.positions[c * 3 + 2];
            signedVolume += (ax * (by * cz - bz * cy) + ay * (bz * cx - bx * cz) + az * (bx * cy - by * cx)) / 6.0;
        }
        let boundaryEdges = 0;
        let nonManifoldEdges = 0;
        for (const count of edges.values()) {
            if (count === 1) boundaryEdges++;
            else if (count !== 2) nonManifoldEdges++;
        }
        return {
            vertices: mesh.positions.length / 3,
            triangles: mesh.indices.length / 3,
            boundaryEdges,
            nonManifoldEdges,
            signedVolume
        };
    }

    function appendCylindricalDrainClosure(mesh, sample, cfg) {
        if (!(cfg.sys === 'cylindrical' && cfg.isPot && cfg.cylDrain > 0.0001)) return cleanupMesh(mesh);

        const positions = mesh.positions.slice();
        const indices = mesh.indices.slice();
        const outerRing = [];
        const innerRing = [];
        const holeBottom = [];
        const holeTop = [];
        const drain = Math.max(0.01, cfg.cylDrain);
        const baseY = Math.max(0, cfg.cylBase);

        function addPoint(p) {
            positions.push(p.x, p.y, p.z);
            return (positions.length / 3) - 1;
        }

        for (let it = 0; it < sample.resT; it++) {
            const theta = (2 * Math.PI * it) / sample.resT;
            outerRing.push(addPoint(sample.layers[0][0][it]));
            innerRing.push(addPoint(sample.layers[2][0][it]));
            holeBottom.push(addPoint({ x: drain * Math.cos(theta), y: 0, z: -drain * Math.sin(theta) }));
            holeTop.push(addPoint({ x: drain * Math.cos(theta), y: baseY, z: -drain * Math.sin(theta) }));
        }

        for (let it = 0; it < sample.resT; it++) {
            const it1 = (it + 1) % sample.resT;
            indices.push(outerRing[it], holeBottom[it1], holeBottom[it], outerRing[it], outerRing[it1], holeBottom[it1]);
            indices.push(innerRing[it], holeTop[it], holeTop[it1], innerRing[it], holeTop[it1], innerRing[it1]);
            indices.push(holeBottom[it], holeBottom[it1], holeTop[it1], holeBottom[it], holeTop[it1], holeTop[it]);
        }

        return cleanupMesh({ positions, indices });
    }

    function buildMultipartMeshes(cfg) {
        const sample = buildLayeredSample(cfg);
        const occ = buildOccupancies(sample, cfg);
        const skipDrainBottom = cfg.sys === 'cylindrical' && cfg.isPot && cfg.cylDrain > 0.0001;
        let baseMesh = buildOccupancyMesh(sample, occ.baseOcc, {
            skipMinusIVFace: (k, iv) => skipDrainBottom && iv === 0
        });
        if (skipDrainBottom) baseMesh = appendCylindricalDrainClosure(baseMesh, sample, cfg);
        const patternMesh = occ.hasPattern ? buildOccupancyMesh(sample, occ.patternOcc) : { positions: [], indices: [] };
        return {
            baseMesh,
            patternMesh,
            baseValidation: validateMesh(baseMesh),
            patternValidation: occ.hasPattern ? validateMesh(patternMesh) : { vertices: 0, triangles: 0, boundaryEdges: 0, nonManifoldEdges: 0 },
            hasPattern: occ.hasPattern
        };
    }

    function meshToThreeGeometry(mesh) {
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(mesh.positions, 3));
        geometry.setIndex(mesh.indices);
        geometry.computeVertexNormals();
        return geometry;
    }

    function disposeObject(obj) {
        if (!obj) return;
        obj.traverse(child => {
            if (child.geometry) child.geometry.dispose();
            if (Array.isArray(child.material)) child.material.forEach(m => m && m.dispose && m.dispose());
            else if (child.material) child.material.dispose();
        });
        scene.remove(obj);
    }

    function updatePreview() {
        if (renderTimeout) clearTimeout(renderTimeout);
        setStatus("Generating preview...");

        renderTimeout = setTimeout(() => {
            try {
                if (currentObject) {
                    disposeObject(currentObject);
                    currentObject = null;
                }

                const cfg = getConfig();

                if (supportsMultipart(cfg)) {
                    const parts = buildMultipartMeshes(cfg);
                    const group = new THREE.Group();

                    const baseGeom = meshToThreeGeometry(parts.baseMesh);
                    const baseMat = new THREE.MeshStandardMaterial({
                        color: cfg.baseColor,
                        roughness: 0.72,
                        metalness: 0.08,
                        transparent: parts.hasPattern,
                        opacity: parts.hasPattern ? 0.76 : 1.0,
                        side: THREE.DoubleSide
                    });
                    group.add(new THREE.Mesh(baseGeom, baseMat));

                    if (parts.hasPattern && parts.patternMesh.indices.length > 0) {
                        const patternGeom = meshToThreeGeometry(parts.patternMesh);
                        const patternMat = new THREE.MeshStandardMaterial({
                            color: cfg.patternColor,
                            roughness: 0.55,
                            metalness: 0.05,
                            side: THREE.DoubleSide
                        });
                        group.add(new THREE.Mesh(patternGeom, patternMat));
                    }

                    currentObject = group;
                    scene.add(group);

                    const warnBits = [];
                    if (parts.baseValidation.boundaryEdges || parts.baseValidation.nonManifoldEdges) warnBits.push(`Base B:${parts.baseValidation.boundaryEdges} N:${parts.baseValidation.nonManifoldEdges}`);
                    if (parts.hasPattern && (parts.patternValidation.boundaryEdges || parts.patternValidation.nonManifoldEdges)) warnBits.push(`Pattern B:${parts.patternValidation.boundaryEdges} N:${parts.patternValidation.nonManifoldEdges}`);
                    if (cfg.requestedPatternDepthCm > cfg.patternDepthCm + 1e-6) warnBits.push(`Depth clamped to ${(cfg.patternDepthCm * 10).toFixed(1)} mm`);

                    const suffix = warnBits.length ? ` | ${warnBits.join(' | ')}` : ``;
                    setStatus(`Split preview | Depth ${(cfg.patternDepthCm * 10).toFixed(1)} mm${suffix}`, warnBits.length ? 'warn' : '');
                } else {
                    const meshData = cfg.sys === 'cylindrical' ? generateCylindrical(cfg) : generateSpherical(cfg);
                    const geometry = new THREE.BufferGeometry();
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(meshData.vertices, 3));
                    if (meshData.colors && meshData.colors.length === meshData.vertices.length) {
                        geometry.setAttribute('color', new THREE.Float32BufferAttribute(meshData.colors, 3));
                    }
                    geometry.setIndex(meshData.indices);
                    geometry.computeVertexNormals();
                    const material = new THREE.MeshStandardMaterial({ vertexColors: !!meshData.colors, side: THREE.DoubleSide, roughness: 0.7, metalness: 0.1 });
                    currentObject = new THREE.Mesh(geometry, material);
                    scene.add(currentObject);
                    setStatus("Preview generated.", '');
                }
            } catch (err) {
                console.error(err);
                setStatus("Error: invalid equation or geometry failure.", 'error');
            }
        }, 30);
    }

    function chooseColor(cfg, theta, z, phi, v) {
        const base = hexToRgb01(cfg.baseColor);
        const pattern = hexToRgb01(cfg.patternColor);
        const mask = secureEval(cfg.patternEq, theta, z, phi, v, 0, true);
        return mask > 0 ? pattern : base;
    }

    function generateCylindrical(cfg) {
        const vertices = [], indices = [], colors = [];
        const addV = (x, y, z, color) => {
            vertices.push(x, y, z);
            colors.push(color[0], color[1], color[2]);
            return (vertices.length / 3) - 1;
        };

        let oRings = [], iRings = [];
        const actualBase = cfg.isPot ? cfg.cylBase : 0;
        const actualDrain = cfg.isPot ? cfg.cylDrain : 0;

        for (let iv = 0; iv <= cfg.resV; iv++) {
            const zO = cfg.h * (iv / cfg.resV);
            const zI = actualBase + (cfg.h - actualBase) * (iv / cfg.resV);
            const v = iv / cfg.resV;
            let oR = [], iR = [];

            for (let it = 0; it < cfg.resT; it++) {
                const theta = (2 * Math.PI * it) / cfg.resT;
                const rBaseOuter = secureEval(cfg.eq, theta, zO, 0, v, cfg.R, false);
                const rBaseInner = secureEval(cfg.eq, theta, zI, 0, v, cfg.R, false);
                const texDisp = secureEval(cfg.texEq, theta, zO, 0, v, 0, true);

                const rOut = rBaseOuter + (texDisp * cfg.texInt);
                const rIn = Math.max(0.1, rBaseInner - cfg.w);

                const outerColor = chooseColor(cfg, theta, zO, 0, v);
                oR.push(addV(rOut * Math.cos(theta), zO, -rOut * Math.sin(theta), outerColor));
                iR.push(addV(rIn * Math.cos(theta), zI, -rIn * Math.sin(theta), outerColor));
            }
            oRings.push(oR);
            iRings.push(iR);
        }

        let hB = [], hT = [];
        for (let it = 0; it < cfg.resT; it++) {
            const theta = (2 * Math.PI * it) / cfg.resT;
            const holeColor = hexToRgb01(cfg.baseColor);
            hB.push(addV(actualDrain * Math.cos(theta), 0, -actualDrain * Math.sin(theta), holeColor));
            hT.push(addV(actualDrain * Math.cos(theta), actualBase, -actualDrain * Math.sin(theta), holeColor));
        }

        for (let it = 0; it < cfg.resT; it++) {
            const it1 = (it + 1) % cfg.resT;

            for (let iv = 0; iv < cfg.resV; iv++) {
                indices.push(oRings[iv][it], oRings[iv + 1][it], oRings[iv + 1][it1], oRings[iv][it], oRings[iv + 1][it1], oRings[iv][it1]);
                indices.push(iRings[iv][it], iRings[iv][it1], iRings[iv + 1][it1], iRings[iv][it], iRings[iv + 1][it1], iRings[iv + 1][it]);
            }
            indices.push(oRings[cfg.resV][it], iRings[cfg.resV][it], iRings[cfg.resV][it1], oRings[cfg.resV][it], iRings[cfg.resV][it1], oRings[cfg.resV][it1]);

            if (cfg.isPot && cfg.cylDrain > 0) {
                indices.push(oRings[0][it], hB[it1], hB[it], oRings[0][it], oRings[0][it1], hB[it1]);
                indices.push(iRings[0][it], hT[it], hT[it1], iRings[0][it], hT[it1], iRings[0][it1]);
                indices.push(hB[it], hB[it1], hT[it1], hB[it], hT[it1], hT[it]);
            } else {
                indices.push(oRings[0][it], oRings[0][it1], iRings[0][it1], oRings[0][it], iRings[0][it1], iRings[0][it]);
            }
        }
        return { vertices, indices, colors };
    }

    function generateSpherical(cfg) {
        const vertices = [], indices = [], colors = [];
        let minY = Infinity;

        const phiStart = cfg.isPot ? cfg.sphTopCut : 0.001;
        const phiEnd = cfg.isPot ? cfg.sphBotCut : Math.PI - 0.001;
        const flatBottomY = cfg.R * Math.cos(cfg.sphBotFlatten);

        let oRings = [], iRings = [];
        for (let iv = 0; iv <= cfg.resV; iv++) {
            const phi = phiStart + (phiEnd - phiStart) * (iv / cfg.resV);
            const v = (phi - phiEnd) / (phiStart - phiEnd);
            const oR = [], iR = [];

            for (let it = 0; it < cfg.resT; it++) {
                const theta = (2 * Math.PI * it) / cfg.resT;
                const rBaseOuter = secureEval(cfg.eq, theta, 0, phi, v, cfg.R, false);
                const texDisp = secureEval(cfg.texEq, theta, 0, phi, v, 0, true);

                const rOut = rBaseOuter + (texDisp * cfg.texInt);
                const rIn = Math.max(0.1, rBaseOuter - cfg.w);

                let oX = rOut * Math.sin(phi) * Math.cos(theta);
                let oZ = rOut * Math.sin(phi) * Math.sin(theta);
                let oY = rOut * Math.cos(phi);

                let iX = rIn * Math.sin(phi) * Math.cos(theta);
                let iZ = rIn * Math.sin(phi) * Math.sin(theta);
                let iY = rIn * Math.cos(phi);

                if (cfg.isPot && (phi >= cfg.sphBotFlatten || oY < flatBottomY)) {
                    oY = flatBottomY;
                    iY = flatBottomY + cfg.w;
                }

                if (!isNaN(oY) && oY < minY) minY = oY;
                const outerColor = chooseColor(cfg, theta, 0, phi, v);

                oR.push({ x: oX, y: oY, z: -oZ, c: outerColor });
                iR.push({ x: iX, y: iY, z: -iZ, c: outerColor });
            }
            oRings.push(oR);
            iRings.push(iR);
        }

        if (minY === Infinity) minY = -cfg.R;

        const addV = (pt) => {
            vertices.push(pt.x, pt.y - minY, pt.z);
            colors.push(pt.c[0], pt.c[1], pt.c[2]);
            return (vertices.length / 3) - 1;
        };

        let oIdx = [], iIdx = [];
        for (let iv = 0; iv <= cfg.resV; iv++) {
            let oRow = [], iRow = [];
            for (let it = 0; it < cfg.resT; it++) {
                oRow.push(addV(oRings[iv][it]));
                iRow.push(addV(iRings[iv][it]));
            }
            oIdx.push(oRow);
            iIdx.push(iRow);
        }

        for (let it = 0; it < cfg.resT; it++) {
            const it1 = (it + 1) % cfg.resT;
            for (let iv = 0; iv < cfg.resV; iv++) {
                indices.push(oIdx[iv][it], oIdx[iv + 1][it], oIdx[iv + 1][it1], oIdx[iv][it], oIdx[iv + 1][it1], oIdx[iv][it1]);
                indices.push(iIdx[iv][it], iIdx[iv][it1], iIdx[iv + 1][it1], iIdx[iv][it], iIdx[iv + 1][it1], iIdx[iv + 1][it]);
            }
            indices.push(oIdx[0][it], oIdx[0][it1], iIdx[0][it1], oIdx[0][it], iIdx[0][it1], iIdx[0][it]);
            indices.push(oIdx[cfg.resV][it], iIdx[cfg.resV][it], iIdx[cfg.resV][it1], oIdx[cfg.resV][it], iIdx[cfg.resV][it1], oIdx[cfg.resV][it1]);
        }
        return { vertices, indices, colors };
    }

    function exportSTL() {
        try {
            const cfg = getConfig();
            const meshData = cfg.sys === 'cylindrical' ? generateCylindrical(cfg) : generateSpherical(cfg);
            const v = meshData.vertices;
            const idx = meshData.indices;
            const numTriangles = idx.length / 3;

            const buffer = new ArrayBuffer(84 + numTriangles * 50);
            const view = new DataView(buffer);
            view.setUint32(80, numTriangles, true);

            let offset = 84;
            for (let i = 0; i < idx.length; i += 3) {
                view.setFloat32(offset, 0, true); offset += 12;
                for (let j = 0; j < 3; j++) {
                    const vIdx = idx[i + j] * 3;
                    view.setFloat32(offset, v[vIdx] * 10, true);
                    view.setFloat32(offset + 4, v[vIdx + 1] * 10, true);
                    view.setFloat32(offset + 8, v[vIdx + 2] * 10, true);
                    offset += 12;
                }
                view.setUint16(offset, 0, true); offset += 2;
            }

            const blob = new Blob([buffer], { type: 'application/octet-stream' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            const prefix = cfg.isPot ? "Pot_" : "Mesh_";
            link.download = `${prefix}${cfg.sys}.stl`;
            link.click();
            setStatus("STL exported. STL carries geometry only, not multi-part assembly.", 'warn');
        } catch (err) {
            console.error(err);
            setStatus("STL export failed.", 'error');
        }
    }

    function meshTo3mfObjectXml(id, name, mesh) {
        const verticesXml = [];
        for (let i = 0; i < mesh.positions.length; i += 3) {
            verticesXml.push(`<vertex x="${(mesh.positions[i] * 10).toFixed(5)}" y="${(mesh.positions[i + 1] * 10).toFixed(5)}" z="${(mesh.positions[i + 2] * 10).toFixed(5)}" />`);
        }

        const trianglesXml = [];
        for (let i = 0; i < mesh.indices.length; i += 3) {
            trianglesXml.push(`<triangle v1="${mesh.indices[i]}" v2="${mesh.indices[i + 1]}" v3="${mesh.indices[i + 2]}" />`);
        }

        return `
  <object id="${id}" type="model" name="${name}">
    <mesh>
      <vertices>
        ${verticesXml.join('')}
      </vertices>
      <triangles>
        ${trianglesXml.join('')}
      </triangles>
    </mesh>
  </object>`;
    }

    async function exportMultiPart3MF() {
        try {
            const cfg = getConfig();
            const parts = buildMultipartMeshes(cfg);
            if (parts.baseValidation.boundaryEdges || parts.baseValidation.nonManifoldEdges ||
                parts.patternValidation.boundaryEdges || parts.patternValidation.nonManifoldEdges) {
                setStatus(`Export stopped. Base B:${parts.baseValidation.boundaryEdges} N:${parts.baseValidation.nonManifoldEdges} | Pattern B:${parts.patternValidation.boundaryEdges} N:${parts.patternValidation.nonManifoldEdges}`, 'error');
                return;
            }

            const resources = [];
            resources.push(meshTo3mfObjectXml(1, 'Base', parts.baseMesh));

            let componentsXml = `<component objectid="1" />`;
            if (parts.hasPattern && parts.patternMesh.indices.length > 0) {
                resources.push(meshTo3mfObjectXml(2, 'Pattern', parts.patternMesh));
                componentsXml += `<component objectid="2" />`;
            }

            resources.push(`
  <object id="3" type="model" name="Pot Assembly">
    <components>
      ${componentsXml}
    </components>
  </object>`);

            const modelXml = `<?xml version="1.0" encoding="UTF-8"?>
<model unit="millimeter" xml:lang="en-US" xmlns="http://schemas.microsoft.com/3dmanufacturing/core/2015/02">
  <resources>
    ${resources.join('')}
  </resources>
  <build>
    <item objectid="3" />
  </build>
</model>`;

            const contentTypesXml = `<?xml version="1.0" encoding="UTF-8"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml" />
  <Default Extension="model" ContentType="application/vnd.ms-package.3dmanufacturing-3dmodel+xml" />
  <Override PartName="/3D/3dmodel.model" ContentType="application/vnd.ms-package.3dmanufacturing-3dmodel+xml" />
</Types>`;

            const relsXml = `<?xml version="1.0" encoding="UTF-8"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Target="/3D/3dmodel.model" Id="rel0" Type="http://schemas.microsoft.com/3dmanufacturing/2013/01/3dmodel" />
</Relationships>`;

            const zip = new JSZip();
            zip.file('[Content_Types].xml', contentTypesXml);
            zip.folder('_rels').file('.rels', relsXml);
            zip.folder('3D').file('3dmodel.model', modelXml);

            const blob = await zip.generateAsync({ type: 'blob', mimeType: 'model/3mf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Pot_${cfg.sys}_multipart.3mf`;
            link.click();

            setStatus(`3MF exported | Base ${parts.baseValidation.triangles} tris | Pattern ${parts.patternValidation.triangles} tris | manifold check passed`);
        } catch (err) {
            console.error(err);
            setStatus("3MF export failed.", 'error');
        }
    }
</script>
</body>
